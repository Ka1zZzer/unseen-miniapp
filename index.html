<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unseen</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f1a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  .logo {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin-bottom: 24px;
    box-shadow: 0 8px 32px rgba(124, 58, 237, 0.4);
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #a78bfa, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  p {
    font-size: 15px;
    color: #94a3b8;
    line-height: 1.6;
    margin-bottom: 32px;
    max-width: 280px;
  }
  .btn {
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 16px 32px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    max-width: 300px;
    box-shadow: 0 4px 24px rgba(124, 58, 237, 0.4);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn:active {
    transform: scale(0.97);
    box-shadow: 0 2px 12px rgba(124, 58, 237, 0.3);
  }
  .hint {
    margin-top: 16px;
    font-size: 13px;
    color: #475569;
  }
</style>
</head>
<body>
<div class="logo">👁</div>
<h1>Unseen</h1>
<p>Подключи бота чтобы видеть удалённые и отредактированные сообщения</p>
<button class="btn" onclick="openSettings()">⚙️ Открыть настройки Telegram</button>
<p class="hint">Настройки → Автоматизация чатов → добавь @GetUnseen_Bot</p>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  function openSettings() {
    tg.openTelegramLink("tg://settings/edit");
  }
</script>
</body>
</html>
